spring.application.name=cit-eval

# Database Connection
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/db_eval?stringtype=unspecified}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin}

# Server binding for Fly.io and local development
server.port=${PORT:8080}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway runs on startup and creates the schema automatically.
spring.flyway.baseline-on-migrate=true

# Allowed frontend origins for local dev and deployed Vercel apps.
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,https://*.vercel.app}

# Key storage paths. On Fly.io, point these at a mounted volume such as /data.
app.keys.private-file=${SERVER_PRIVATE_KEY_PATH:server_private.key}
app.keys.public-file=${SERVER_PUBLIC_KEY_PATH:server_public.key}
# On Render (or other ephemeral filesystems), prefer storing keys as base64 env secrets.
app.keys.private-base64=${APP_KEYS_PRIVATE_BASE64:}
app.keys.public-base64=${APP_KEYS_PUBLIC_BASE64:}

# Admin Credentials
app.admin.username=${APP_ADMIN_USERNAME:admin}
app.admin.password=${APP_ADMIN_PASSWORD:root}

# Google OAuth Client ID for Spring Security
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}

# The app uses its own JWT auth, so disable Spring Security's default generated user.
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# Persistent JWT secret for admin sessions. Use a strong value in Render.
app.jwt.secret=${APP_JWT_SECRET:}
