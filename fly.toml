app = "cit-eval-backend"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  SERVER_PRIVATE_KEY_PATH = "/data/server_private.key"
  SERVER_PUBLIC_KEY_PATH = "/data/server_public.key"

[[mounts]]
  source = "cit_eval_data"
  destination = "/data"

[[services]]
  internal_port = 8080
  protocol = "tcp"

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20